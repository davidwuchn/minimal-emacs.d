name: CI
on:
  - workflow_dispatch
  - pull_request

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        emacs-version:
          - 29.4
    steps:
      - uses: actions/checkout@v4

      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package-lint
        run: |
          emacs -Q --batch \
            --eval "(require 'package)" \
            --eval "(add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t)" \
            --eval "(package-initialize)" \
            --eval "(package-refresh-contents)" \
            --eval "(package-install 'package-lint)"

      - name: Run Linters
        run: |
          ./scripts/lint-elisp.sh

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        emacs-version:
          - 29.1
          - 29.4
          - 30.1
        python-version:
          - 3.11
    steps:
      # Cask
      - uses: actions/checkout@v2
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - name: Compile
        run: |
          LISP_ERR_ON_WARN="(setq byte-compile-error-on-warn t) (setq byte-compile-warnings '(not obsolete free-vars))"
          emacs -batch -L . --eval "(progn $LISP_ERR_ON_WARN )"  -f batch-byte-compile early-init.el
          emacs -batch -L . --eval "(progn $LISP_ERR_ON_WARN (load \"early-init.el\" nil t t) )" -f batch-byte-compile init.el

      - name: Run Programmatic Tests
        run: |
          emacs --batch -Q -L . -L lisp -L lisp/modules \
            -l tests/test-programmatic.el \
            -l tests/test-tool-confirm-programmatic.el \
            -f ert-run-tests-batch-and-exit

      - name: Run Trim Tests
        run: |
          emacs --batch -Q -L . -L lisp -L lisp/modules \
            -l tests/test-gptel-trim.el \
            -f ert-run-tests-batch-and-exit

      - name: Run ECA Tests
        run: |
          emacs --batch -Q -L . -L lisp -L lisp/modules \
            -l tests/test-eca-ext.el \
            -l tests/test-eca-security.el \
            -f ert-run-tests-batch-and-exit

      - name: Run Edit/Apply Tool Tests
        run: |
          emacs --batch -Q -L . -L lisp -L lisp/modules \
            -l tests/test-gptel-tools-edit.el \
            -l tests/test-gptel-tools-apply.el \
            -f ert-run-tests-batch-and-exit

      - name: Run Wrapped FSM Tests
        run: |
          emacs --batch -Q -L . -L lisp -L lisp/modules \
            -l tests/test-wrapped-fsm.el \
            -f ert-run-tests-batch-and-exit

      - name: Verify Nucleus Tool Contracts
        run: |
          ./scripts/verify-nucleus.sh
