name: CI
on:
  - workflow_dispatch
  - pull_request

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        emacs-version:
          - 29.4
    steps:
      - uses: actions/checkout@v4

      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package-lint
        run: |
          emacs -Q --batch \
            --eval "(require 'package)" \
            --eval "(add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t)" \
            --eval "(package-initialize)" \
            --eval "(package-refresh-contents)" \
            --eval "(package-install 'package-lint)"

      - name: Run Linters
        run: |
          ./scripts/lint-elisp.sh

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        emacs-version:
          - 29.1
          - 29.4
          - 30.1
        python-version:
          - 3.11
    steps:
      # Cask
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - name: Compile
        run: |
          LISP_ERR_ON_WARN="(setq byte-compile-error-on-warn t) (setq byte-compile-warnings '(not obsolete free-vars))"
          emacs -batch -L . --eval "(progn $LISP_ERR_ON_WARN )"  -f batch-byte-compile early-init.el
          emacs -batch -L . --eval "(progn $LISP_ERR_ON_WARN (load \"early-init.el\" nil t t) )" -f batch-byte-compile init.el

      - name: Run Programmatic Tests
        run: |
          emacs --batch -Q -L . -L lisp -L lisp/modules \
            -l tests/test-programmatic.el \
            -l tests/test-tool-confirm-programmatic.el \
            -f ert-run-tests-batch-and-exit

      - name: Run Trim Tests
        run: |
          emacs --batch -Q -L . -L lisp -L lisp/modules \
            -l tests/test-gptel-trim.el \
            -l tests/test-gptel-ext-reasoning.el \
            -f ert-run-tests-batch-and-exit

      - name: Run Treesit Agent Tests
        continue-on-error: true
        run: |
          emacs --batch -Q -L . -L lisp -L lisp/modules \
            -l tests/test-treesit-agent-tools.el \
            -l tests/test-treesit-agent-integration.el \
            -l tests/test-treesit-agent-tools-workspace.el \
            -f ert-run-tests-batch-and-exit

      - name: Run Agent Integration Tests
        run: |
          emacs --batch -Q -L . -L lisp -L lisp/modules \
            -l tests/test-gptel-tools-agent-integration.el \
            -l tests/test-gptel-tools-agent-core.el \
            -f ert-run-tests-batch-and-exit

      - name: Run Security Tests
        run: |
          emacs --batch -Q -L . -L lisp -L lisp/modules \
            -l tests/test-gptel-ext-security.el \
            -l tests/test-gptel-sandbox.el \
            -l tests/test-gptel-ext-tool-confirm.el \
            -l tests/test-gptel-ext-tool-permits.el \
            -l tests/test-gptel-ext-fsm.el \
            -l tests/test-gptel-ext-tool-sanitize.el \
            -f ert-run-tests-batch-and-exit

      - name: Run Context/Core Tests
        run: |
          emacs --batch -Q -L . -L lisp -L lisp/modules \
            -l tests/test-gptel-ext-context.el \
            -l tests/test-gptel-ext-core.el \
            -l tests/test-gptel-ext-context-cache.el \
            -f ert-run-tests-batch-and-exit

      - name: Run ECA Tests
        run: |
          emacs --batch -Q -L . -L lisp -L lisp/modules \
            -l tests/test-eca-ext.el \
            -l tests/test-eca-security.el \
            -f ert-run-tests-batch-and-exit

      - name: Run Edit/Apply Tool Tests
        run: |
          emacs --batch -Q -L . -L lisp -L lisp/modules \
            -l tests/test-gptel-tools-edit.el \
            -l tests/test-gptel-tools-apply.el \
            -f ert-run-tests-batch-and-exit

      - name: Run Wrapped FSM Tests
        run: |
          emacs --batch -Q -L . -L lisp -L lisp/modules \
            -l tests/test-wrapped-fsm.el \
            -f ert-run-tests-batch-and-exit

      - name: Run Agent/Bash/Code Tool Tests
        run: |
          emacs --batch -Q -L . -L lisp -L lisp/modules \
            -l tests/test-gptel-tools-agent.el \
            -l tests/test-gptel-tools-bash.el \
            -l tests/test-gptel-tools-code.el \
            -f ert-run-tests-batch-and-exit

      - name: Run Glob/Grep/Introspection Tests
        run: |
          emacs --batch -Q -L . -L lisp -L lisp/modules \
            -l tests/test-gptel-tools-glob.el \
            -l tests/test-gptel-tools-grep.el \
            -l tests/test-gptel-tools-introspection.el \
            -f ert-run-tests-batch-and-exit

      - name: Run Treesit Core Tests
        continue-on-error: true
        run: |
          emacs --batch -Q -L . -L lisp -L lisp/modules \
            -l tests/test-treesit-agent-tools-core.el \
            -f ert-run-tests-batch-and-exit

      - name: Run Core/Preview/Programmatic Tool Tests
        run: |
          emacs --batch -Q -L . -L lisp -L lisp/modules \
            -l tests/test-gptel-tools.el \
            -l tests/test-gptel-tools-core.el \
            -l tests/test-gptel-tools-preview.el \
            -l tests/test-gptel-tools-programmatic.el \
            -l tests/test-nucleus-tools.el \
            -f ert-run-tests-batch-and-exit

      - name: Verify Nucleus Tool Contracts
        run: |
          ./scripts/verify-nucleus.sh
