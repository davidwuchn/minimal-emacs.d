name: Evolution Cycle

on:
  push:
    branches:
      - main
    paths:
      - 'lisp/modules/gptel-benchmark-*.el'
      - 'lisp/modules/gptel-workflow-*.el'
      - 'assistant/evals/workflow-tests/**'
      - 'mementum/**'
      - 'benchmarks/**'
  workflow_dispatch:

concurrency:
  group: evolution-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evolution:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Emacs
        uses: purcell/setup-emacs@master
        with:
          version: 29.4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install jsonschema requests

      - name: Load Historical Benchmark Data
        id: load-data
        run: |
          echo "Loading historical benchmark data..."
          SKILL_COUNT=$(ls benchmarks/*-results.json 2>/dev/null | wc -l | tr -d ' ')
          WORKFLOW_COUNT=$(ls benchmarks/workflows/*-results.json 2>/dev/null | wc -l | tr -d ' ')
          TOTAL=$((SKILL_COUNT + WORKFLOW_COUNT))
          echo "skill_count=$SKILL_COUNT" >> $GITHUB_OUTPUT
          echo "workflow_count=$WORKFLOW_COUNT" >> $GITHUB_OUTPUT
          echo "benchmark_count=$TOTAL" >> $GITHUB_OUTPUT
          echo "Found $SKILL_COUNT skill benchmarks, $WORKFLOW_COUNT workflow benchmarks"

      - name: Run Evolution Cycle with Data
        id: evolution
        run: |
          emacs --batch -Q -L . -L lisp -L lisp/modules \
            --eval "(require 'gptel-benchmark-daily)" \
            --eval "(require 'gptel-benchmark-integrate)" \
            --eval "(require 'gptel-benchmark-memory)" \
            --eval "(require 'gptel-benchmark-core)" \
            --eval "(require 'gptel-workflow-benchmark)" \
            --eval "(gptel-benchmark-memory-init)" \
            --eval "(message \"[evolution] Loading historical benchmark data...\")" \
            --eval "(let* ((all-results '()))
                     ;; Load skill benchmarks
                     (dolist (file (directory-files \"benchmarks/\" t \"-results\\\\.json$\"))
                       (when (file-exists-p file)
                         (let* ((data (gptel-benchmark-read-json file))
                                (name (replace-regexp-in-string \"-results\\\\.json$\" \"\" (file-name-nondirectory file))))
                           (push (list :name name :type 'skill :results data) all-results))))
                     ;; Load workflow benchmarks
                     (when (file-exists-p \"benchmarks/workflows/\")
                       (dolist (file (directory-files \"benchmarks/workflows/\" t \"-results\\\\.json$\"))
                         (when (file-exists-p file)
                           (let* ((data (gptel-benchmark-read-json file))
                                  (name (replace-regexp-in-string \"-results\\\\.json$\" \"\" (file-name-nondirectory file))))
                             (push (list :name name :type 'workflow :results data) all-results)))))
                     (message \"[evolution] Loaded %d benchmark results\" (length all-results))
                     (dolist (result all-results)
                       (let* ((name (plist-get result :name))
                              (type (plist-get result :type))
                              (data (plist-get result :results)))
                         (message \"[evolution] Evolving %s (%s)...\" name type)
                         (condition-case err
                             (gptel-benchmark-evolve-with-improvement name type data)
                           (error (message \"[evolution] Error evolving %s: %s\" name err)))))
                     (gptel-benchmark-evolution-cycle \"ci-with-data\"))" \
            --eval "(message \"[evolution] Checking capabilities...\")" \
            --eval "(gptel-benchmark-evolution-check-capabilities)" \
            --eval "(message \"[evolution] Evolution complete.\")"
          
          echo "cycle_complete=true" >> $GITHUB_OUTPUT

      - name: Check for Changes
        id: changes
        run: |
          git add mementum/
          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "changes=$(git diff --cached --stat)" >> $GITHUB_OUTPUT
          fi

      - name: Create Evolution Branch
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          BRANCH_NAME="evolution/${TIMESTAMP}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH_NAME"
          git add mementum/
          git commit -m "🔄 evolution: Ouroboros cycle $(date +%Y-%m-%d)

          Evolution cycle triggered by push to main.
          Benchmarks analyzed: ${{ steps.load-data.outputs.benchmark_count }}
          
          Co-evolved-by: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          git push origin "$BRANCH_NAME"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = '${{ steps.changes.outputs.branch_name }}';
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔄 Evolution: ${new Date().toISOString().split('T')[0]}`,
              head: branch,
              base: 'main',
              body: `## Evolution Cycle
            
            This PR contains automatic updates from the Ouroboros evolution cycle.
            
            ### What Changed
            - Analyzed ${{ steps.load-data.outputs.benchmark_count }} benchmark results
            - Updated mementum/state.md with latest evolution state
            - Synthesized memories into knowledge pages
            
            ### Review Checklist
            - [ ] Check state.md for accuracy
            - [ ] Verify any new knowledge pages
            - [ ] Merge if changes look reasonable
            
            ---
            
            *Auto-generated by evolution workflow*`
            });
            
            console.log(`Created PR #${pr.number}: ${pr.html_url}`);

      - name: Summary
        run: |
          echo "## Evolution Cycle Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Benchmarks analyzed: ${{ steps.load-data.outputs.benchmark_count }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.changes.outputs.has_changes }}" == "true" ]; then
            echo "✅ Evolution cycle completed with changes" >> $GITHUB_STEP_SUMMARY
            echo "Branch: ${{ steps.changes.outputs.branch_name }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Evolution cycle completed - no changes needed" >> $GITHUB_STEP_SUMMARY
          fi